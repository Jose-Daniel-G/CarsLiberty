name: Laravel Tests

on:
  push:
    branches: [ "main", "juan/dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, dom, curl, libxml, sqlite3
        coverage: none

    - name: Install Dependencies
      run: composer install --prefer-dist --no-ansi --no-interaction --no-progress --no-scripts

    - name: Prepare Laravel
      run: |
        cp .env.example .env
        php artisan key:generate

    - name: Execute Tests
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: ":memory:"
      run: php vendor/bin/phpunit
    - name: Install NPM dependencies
      run: npm install

    - name: Build assets
      run: npm run build